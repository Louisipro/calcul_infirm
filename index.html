<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calcul Journée</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f2ed;
    --surface: #ffffff;
    --surface2: #faf8f5;
    --border: #e2ddd6;
    --accent: #c8432a;
    --text: #1a1714;
    --muted: #8a8278;
    --green: #2a7a4f;
    --shadow: 0 2px 12px rgba(0,0,0,0.07);
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 32px 20px 60px;
  }

  header {
    max-width: 1100px;
    margin: 0 auto 32px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }

  .header-left h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(2rem, 5vw, 3rem);
    letter-spacing: -0.02em;
    line-height: 1;
  }

  .header-left .subtitle {
    font-size: 0.85rem;
    color: var(--muted);
    margin-top: 4px;
    font-weight: 300;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .header-controls {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: flex-end;
  }

  .field-group {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  label {
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
  }

  input[type="date"], input[type="text"] {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    padding: 8px 12px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="date"] { min-width: 148px; }
  input[type="text"] { min-width: 180px; }
  input[type="date"]:focus, input[type="text"]:focus { border-color: var(--accent); }

  .date-mode-toggle {
    display: flex;
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    background: var(--surface);
  }

  .date-mode-toggle button {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 7px 13px;
    border: none;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.18s;
    white-space: nowrap;
  }

  .date-mode-toggle button.active { background: var(--text); color: #fff; }

  .date-row {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .date-sep {
    font-size: 0.72rem;
    color: var(--muted);
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .main-card {
    max-width: 1100px;
    margin: 0 auto;
    background: var(--surface);
    border-radius: 16px;
    box-shadow: var(--shadow);
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .table-wrapper { overflow-x: auto; }

  table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }

  thead tr { background: var(--text); color: #fff; }

  thead th {
    padding: 14px 12px;
    text-align: left;
    font-weight: 500;
    font-size: 0.75rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    white-space: nowrap;
  }

  thead th:first-child { padding-left: 20px; }
  thead th:last-child { padding-right: 20px; }
  .col-accent { color: #ffb899; }

  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }

  tbody td { padding: 10px 12px; vertical-align: middle; }
  tbody td:first-child { padding-left: 20px; }
  tbody td:last-child { padding-right: 20px; }

  td input {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.875rem;
    border: none;
    outline: none;
    background: transparent;
    color: var(--text);
    width: 100%;
    padding: 3px 0;
  }

  td input:focus { border-bottom: 1.5px solid var(--accent); }
  td input[type="number"] { -moz-appearance: textfield; }
  td input[type="number"]::-webkit-inner-spin-button,
  td input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }

  .computed { font-variant-numeric: tabular-nums; font-weight: 500; }
  .computed.negative { color: var(--accent); }
  .computed.positive { color: var(--green); }
  .col-pct { font-weight: 600; color: var(--green); font-size: 0.925rem; }

  .add-row-row td { padding: 8px 20px; background: var(--surface2); }

  .btn-add {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--muted);
    background: none;
    border: 1.5px dashed var(--border);
    border-radius: 6px;
    padding: 6px 14px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-add:hover { border-color: var(--accent); color: var(--accent); }

  tfoot tr.totals-row { background: var(--surface2); border-top: 2px solid var(--border); }

  tfoot tr.final-row { background: var(--text); }

  tfoot td { padding: 13px 12px; font-weight: 600; font-size: 0.875rem; }
  tfoot td:first-child { padding-left: 20px; }
  tfoot td:last-child { padding-right: 20px; }

  .total-label { font-family: 'DM Serif Display', serif; font-size: 1rem; }
  .total-val { font-variant-numeric: tabular-nums; font-size: 1rem; }
  .total-pct { font-family: 'DM Serif Display', serif; font-size: 1.1rem; color: var(--green); }

  .final-row td { color: #fff; }

  .final-label {
    font-family: 'DM Serif Display', serif;
    font-size: 1rem;
    letter-spacing: 0.03em;
    color: #ffb899;
    text-align: right;
    padding-right: 16px;
  }

  .final-val {
    font-family: 'DM Serif Display', serif;
    font-size: 1.3rem;
    font-variant-numeric: tabular-nums;
    color: #fff;
    display: block;
  }

  .final-formula {
    font-size: 0.68rem;
    font-family: 'DM Sans', sans-serif;
    font-weight: 400;
    color: rgba(255,255,255,0.4);
    display: block;
    margin-top: 2px;
    letter-spacing: 0.03em;
  }

  .actions-bar {
    max-width: 1100px;
    margin: 20px auto 0;
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    padding: 10px 20px;
    border-radius: var(--radius);
    cursor: pointer;
    border: none;
    transition: all 0.2s;
    letter-spacing: 0.02em;
  }

  .btn-import {
    background: var(--surface);
    color: var(--text);
    border: 1.5px solid var(--border);
  }
  .btn-import:hover { border-color: var(--green); color: var(--green); }

  .btn-export { background: var(--text); color: #fff; }
  .btn-export:hover { background: var(--accent); }

  .btn-pdf {
    background: var(--surface);
    color: var(--text);
    border: 1.5px solid var(--border);
  }
  .btn-pdf:hover { border-color: var(--accent); color: var(--accent); }

  .delete-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--border);
    font-size: 1rem;
    line-height: 1;
    padding: 2px 4px;
    border-radius: 4px;
    transition: color 0.15s;
    display: flex;
    align-items: center;
  }
  .delete-btn:hover { color: var(--accent); }

  @media print {
    body { background: white; padding: 0; }
    .btn-add, .btn, .actions-bar, .delete-btn { display: none !important; }
    .main-card { box-shadow: none; border: 1px solid #ccc; }
    header { margin-bottom: 20px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Calcul Journée</h1>
    <p class="subtitle">Béatrice Petrus — Infirmière Libérale</p>
  </div>
  <div class="header-controls">

    <div class="field-group">
      <label>Période</label>
      <div class="date-mode-toggle">
        <button id="btn-single" class="active" onclick="setMode('single')">Journée</button>
        <button id="btn-period" onclick="setMode('period')">Période</button>
      </div>
    </div>

    <div class="field-group">
      <label id="date-label">Date</label>
      <div class="date-row">
        <input type="date" id="date-start">
        <span class="date-sep" id="date-sep" style="display:none">au</span>
        <input type="date" id="date-end" style="display:none">
      </div>
    </div>

    <div class="field-group">
      <label>Remplaçante</label>
      <input type="text" id="remplacante" placeholder="Nom de la remplaçante">
    </div>

  </div>
</header>

<div class="main-card">
  <div class="table-wrapper">
    <table id="main-table">
      <thead>
        <tr>
          <th style="width:30px"></th>
          <th>Patient</th>
          <th>BSI + IFI (€)</th>
          <th>Déplacements</th>
          <th>Total Dépl. (€)</th>
          <th class="col-accent">BSI − Déplac (€)</th>
          <th class="col-accent">5%</th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
      <tr class="add-row-row">
        <td colspan="7">
          <button class="btn-add" onclick="addRow()">＋ Ajouter un patient</button>
        </td>
      </tr>
      <tfoot>
        <tr class="totals-row">
          <td></td>
          <td class="total-label">TOTAL</td>
          <td class="total-val computed" id="total-bsi">0,00 €</td>
          <td></td>
          <td class="total-val computed" id="total-deplac">0,00 €</td>
          <td class="total-val computed" id="total-net">0,00 €</td>
          <td class="total-pct" id="total-pct">0,00 €</td>
        </tr>
        <tr class="final-row">
          <td colspan="5"></td>
          <td class="final-label">À PAYER</td>
          <td>
            <span class="final-val" id="total-final">0,00 €</span>
            <span class="final-formula">BSI+IFI − 5% + Déplacements &nbsp;·&nbsp; valeurs tronquées au centime, non arrondies</span>
          </td>
        </tr>
      </tfoot>
    </table>
  </div>
</div>

<div class="actions-bar">
  <button class="btn btn-import" onclick="document.getElementById('import-input').click()">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    Importer CSV
  </button>
  <input type="file" id="import-input" accept=".csv" style="display:none" onchange="importCSV(event)">
  <button class="btn btn-pdf" onclick="exportPDF()">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
    Exporter PDF
  </button>
</div>

<script>
  const DEPLAC_UNIT = 2.75;
  let rowCount = 0;
  let currentMode = 'single';

  const today = new Date().toISOString().split('T')[0];
  document.getElementById('date-start').value = today;
  document.getElementById('date-end').value = today;

  function setMode(mode) {
    currentMode = mode;
    const sep = document.getElementById('date-sep');
    const end = document.getElementById('date-end');
    const lbl = document.getElementById('date-label');
    document.getElementById('btn-single').classList.toggle('active', mode === 'single');
    document.getElementById('btn-period').classList.toggle('active', mode === 'period');
    if (mode === 'single') {
      sep.style.display = 'none';
      end.style.display = 'none';
      lbl.textContent = 'Date';
    } else {
      sep.style.display = 'inline';
      end.style.display = 'inline-block';
      lbl.textContent = 'Du';
    }
  }

  function getDateLabel() {
    const start = document.getElementById('date-start').value;
    if (currentMode === 'single') return fmtDate(start);
    const end = document.getElementById('date-end').value;
    return `${fmtDate(start)} au ${fmtDate(end)}`;
  }

  function fmtDate(iso) {
    if (!iso) return '';
    const [y, m, d] = iso.split('-');
    return `${d}/${m}/${y}`;
  }

  function fmt(n) {
    // Tronqué au centime, sans arrondi
    const t = Math.trunc(n * 100) / 100;
    return t.toFixed(2).replace('.', ',') + ' \u20ac';
  }

  function fmtRaw(n) {
    const t = Math.trunc(n * 100) / 100;
    return t.toFixed(2).replace('.', ',');
  }

  function addRow() {
    rowCount++;
    const tbody = document.getElementById('table-body');
    const tr = document.createElement('tr');
    tr.dataset.id = rowCount;
    tr.innerHTML = `
      <td><button class="delete-btn" onclick="removeRow(${rowCount})" title="Supprimer">\xd7</button></td>
      <td><input type="text" placeholder="Nom du patient" onchange="recalc()"></td>
      <td><input type="number" step="0.01" min="0" placeholder="0,00" oninput="recalc()"></td>
      <td><input type="number" step="1" min="0" placeholder="0" oninput="recalc()"></td>
      <td class="computed" id="td-dep-${rowCount}">\u2014</td>
      <td class="computed" id="td-net-${rowCount}">\u2014</td>
      <td class="computed col-pct" id="td-pct-${rowCount}">\u2014</td>
    `;
    tbody.appendChild(tr);
    tr.querySelector('input[type="text"]').focus();
    recalc();
  }

  function removeRow(id) {
    const tr = document.querySelector(`tr[data-id="${id}"]`);
    if (tr) tr.remove();
    recalc();
  }

  function recalc() {
    const rows = document.querySelectorAll('#table-body tr[data-id]');
    let totalBSI = 0, totalDeplac = 0, totalNet = 0, totalPct = 0;

    rows.forEach(tr => {
      const id  = tr.dataset.id;
      const ins = tr.querySelectorAll('input[type="number"]');
      const bsi = parseFloat(ins[0].value) || 0;
      const nb  = parseFloat(ins[1].value) || 0;
      const dep = nb * DEPLAC_UNIT;
      const net = bsi - dep;
      // 5% seulement si déplacements renseignés (nb > 0)
      const pct = nb > 0 ? net * 0.05 : 0;

      document.getElementById(`td-dep-${id}`).textContent = nb > 0 ? fmt(dep) : '\u2014';

      const netEl = document.getElementById(`td-net-${id}`);
      netEl.textContent = (bsi > 0 || nb > 0) ? fmt(net) : '\u2014';
      netEl.className   = 'computed' + (net < 0 ? ' negative' : net > 0 ? ' positive' : '');

      const pctEl = document.getElementById(`td-pct-${id}`);
      pctEl.textContent = nb > 0 ? fmt(pct) : '\u2014';

      totalBSI    += bsi;
      totalDeplac += dep;
      totalNet    += net;
      totalPct    += pct;
    });

    // À PAYER = total BSI+IFI − 5% + total déplacements
    const finalTotal = totalBSI - totalPct + totalDeplac;

    document.getElementById('total-bsi').textContent    = fmt(totalBSI);
    document.getElementById('total-deplac').textContent = fmt(totalDeplac);
    document.getElementById('total-net').textContent    = fmt(totalNet);
    document.getElementById('total-pct').textContent    = fmt(totalPct);
    document.getElementById('total-final').textContent  = fmt(finalTotal);
  }

  function exportCSV() {
    const dateLabel = getDateLabel();
    const rempl     = document.getElementById('remplacante').value || 'N/A';
    const rows      = document.querySelectorAll('#table-body tr[data-id]');

    const header = ['Patient','BSI + IFI (EUR)','Deplacements (nb)','Total Deplacements (EUR)','BSI - Deplac (EUR)','5%'];
    const lines  = [
      '"Calcul Journee"',
      `"Date:","${dateLabel}"`,
      `"Remplacante:","${rempl}"`,
      '"Infirmiere:","Beatrice Petrus"',
      '',
      header.join(';')
    ];

    rows.forEach(tr => {
      const ins     = tr.querySelectorAll('input');
      const patient = ins[0].value || '';
      const bsi     = parseFloat(ins[1].value) || 0;
      const nb      = parseFloat(ins[2].value) || 0;
      const dep     = nb * DEPLAC_UNIT;
      const net     = bsi - dep;
      const pct     = net * 0.05;
      lines.push([
        `"${patient}"`,
        fmtRaw(bsi),
        nb,
        fmtRaw(dep),
        fmtRaw(net),
        nb > 0 ? fmtRaw(pct) : ''
      ].join(';'));
    });

    lines.push('');
    lines.push([
      '"TOTAL"',
      document.getElementById('total-bsi').textContent.replace(' \u20ac',''),
      '',
      document.getElementById('total-deplac').textContent.replace(' \u20ac',''),
      document.getElementById('total-net').textContent.replace(' \u20ac',''),
      document.getElementById('total-pct').textContent.replace(' \u20ac','')
    ].join(';'));

    lines.push('');
    lines.push(`"A PAYER (BSI+IFI - 5% + Deplacements)";;;;;${document.getElementById('total-final').textContent.replace(' \u20ac','')}`);

    const slug = dateLabel.replace(/\//g,'-').replace(/\s/g,'_');
    const blob = new Blob(['\uFEFF' + lines.join('\n')], { type: 'text/csv;charset=utf-8;' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = `calcul_journee_${slug}_${rempl.replace(/\s+/g,'_')}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  }

  function importCSV(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
      const text = e.target.result;
      // Normalize line endings, split lines
      const lines = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');

      // Parse a CSV line respecting quoted fields
      function parseLine(line) {
        const result = [];
        let cur = '', inQ = false;
        for (let i = 0; i < line.length; i++) {
          const c = line[i];
          if (c === '"') { inQ = !inQ; }
          else if (c === ';' && !inQ) { result.push(cur.trim()); cur = ''; }
          else { cur += c; }
        }
        result.push(cur.trim());
        return result;
      }

      let dateVal = '', rempl = '', dataRows = [];
      let headerFound = false;

      for (const raw of lines) {
        const line = raw.trim();
        if (!line) continue;
        const cols = parseLine(line);

        // Detect meta lines
        if (cols[0] === 'Date:' && cols[1]) { dateVal = cols[1]; continue; }
        if (cols[0] === 'Remplacante:' && cols[1]) { rempl = cols[1]; continue; }

        // Detect header row
        if (cols[0] === 'Patient') { headerFound = true; continue; }

        // Skip non-data lines
        if (!headerFound) continue;
        if (!cols[0] || cols[0] === 'TOTAL' || cols[0].startsWith('A PAYER')) continue;

        // Data row: Patient ; BSI ; nb_deplac ; total_deplac ; net ; pct
        const patient = cols[0].replace(/^"|"$/g, '');
        const bsi     = parseFloat((cols[1] || '0').replace(',', '.')) || 0;
        const nb      = parseFloat((cols[2] || '0').replace(',', '.')) || 0;
        if (patient || bsi || nb) dataRows.push({ patient, bsi, nb });
      }

      // Restore date
      if (dateVal) {
        // detect period (contains " au ")
        if (dateVal.includes(' au ')) {
          const parts = dateVal.split(' au ');
          setMode('period');
          document.getElementById('date-start').value = isoDate(parts[0].trim());
          document.getElementById('date-end').value   = isoDate(parts[1].trim());
        } else {
          setMode('single');
          document.getElementById('date-start').value = isoDate(dateVal.trim());
        }
      }

      if (rempl) document.getElementById('remplacante').value = rempl;

      // Clear existing rows and populate
      document.getElementById('table-body').innerHTML = '';
      rowCount = 0;

      if (dataRows.length === 0) {
        addRow(); addRow(); addRow();
      } else {
        dataRows.forEach(({ patient, bsi, nb }) => {
          rowCount++;
          const tbody = document.getElementById('table-body');
          const tr = document.createElement('tr');
          tr.dataset.id = rowCount;
          tr.innerHTML = `
            <td><button class="delete-btn" onclick="removeRow(${rowCount})" title="Supprimer">\xd7</button></td>
            <td><input type="text" placeholder="Nom du patient" onchange="recalc()"></td>
            <td><input type="number" step="0.01" min="0" placeholder="0,00" oninput="recalc()"></td>
            <td><input type="number" step="1" min="0" placeholder="0" oninput="recalc()"></td>
            <td class="computed" id="td-dep-${rowCount}">\u2014</td>
            <td class="computed" id="td-net-${rowCount}">\u2014</td>
            <td class="computed col-pct" id="td-pct-${rowCount}">\u2014</td>
          `;
          tbody.appendChild(tr);
          const ins = tr.querySelectorAll('input');
          ins[0].value = patient;
          ins[1].value = bsi || '';
          ins[2].value = nb  || '';
        });
        recalc();
      }

      // Reset file input so same file can be re-imported
      event.target.value = '';
    };
    reader.readAsText(file, 'UTF-8');
  }

  function exportPDF() {
    const dateLabel = getDateLabel();
    const rempl     = document.getElementById('remplacante').value || '';
    const rows      = document.querySelectorAll('#table-body tr[data-id]');

    const dataRows = [];
    rows.forEach(tr => {
      const ins     = tr.querySelectorAll('input');
      const patient = ins[0].value || '';
      const bsi     = parseFloat(ins[1].value) || 0;
      const nb      = parseFloat(ins[2].value) || 0;
      const dep     = nb * DEPLAC_UNIT;
      const net     = bsi - dep;
      const pct     = nb > 0 ? net * 0.05 : null;
      if (patient || bsi || nb) dataRows.push({ patient, bsi, nb, dep, net, pct });
    });

    const tBSI    = document.getElementById('total-bsi').textContent;
    const tDeplac = document.getElementById('total-deplac').textContent;
    const tNet    = document.getElementById('total-net').textContent;
    const tPct    = document.getElementById('total-pct').textContent;
    const tFinal  = document.getElementById('total-final').textContent;

    const rowsHTML = dataRows.map(r => `
      <tr>
        <td>${r.patient}</td>
        <td>${fmt(r.bsi)}</td>
        <td style="text-align:center">${r.nb || '—'}</td>
        <td>${r.nb > 0 ? fmt(r.dep) : '—'}</td>
        <td>${(r.bsi > 0 || r.nb > 0) ? fmt(r.net) : '—'}</td>
        <td>${r.pct !== null ? fmt(r.pct) : '—'}</td>
      </tr>`).join('');

    const html = `<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8">
    <title>Calcul Journée — ${dateLabel}</title>
    <style>
      @page { margin: 18mm 15mm; }
      body { font-family: 'Helvetica Neue', Arial, sans-serif; color: #1a1714; font-size: 11px; }
      h1 { font-size: 22px; margin: 0 0 2px; letter-spacing: -0.02em; }
      .sub { font-size: 9px; color: #8a8278; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 16px; }
      .meta { display: flex; gap: 24px; margin-bottom: 18px; font-size: 10px; }
      .meta span { color: #8a8278; margin-right: 4px; }
      table { width: 100%; border-collapse: collapse; font-size: 10.5px; }
      thead tr { background: #1a1714; color: #fff; }
      thead th { padding: 8px 10px; text-align: left; font-weight: 500; font-size: 8.5px; text-transform: uppercase; letter-spacing: 0.06em; white-space: nowrap; }
      tbody tr { border-bottom: 1px solid #e2ddd6; }
      tbody tr:nth-child(even) { background: #faf8f5; }
      tbody td { padding: 7px 10px; }
      tfoot tr.t1 { background: #faf8f5; border-top: 2px solid #e2ddd6; }
      tfoot tr.t2 { background: #1a1714; color: #fff; }
      tfoot td { padding: 8px 10px; font-weight: 600; }
      .final-lbl { color: #ffb899; font-size: 11px; text-align: right; padding-right: 12px; }
      .final-amt { font-size: 15px; font-weight: 700; }
      .note { margin-top: 10px; font-size: 8px; color: #aaa; font-style: italic; }
    </style></head><body>
    <h1>Calcul Journée</h1>
    <p class="sub">Béatrice Petrus — Infirmière Libérale</p>
    <div class="meta">
      <div><span>Date :</span>${dateLabel}</div>
      ${rempl ? `<div><span>Remplaçante :</span>${rempl}</div>` : ''}
    </div>
    <table>
      <thead><tr>
        <th>Patient</th><th>BSI + IFI (€)</th><th>Déplacements</th>
        <th>Total Dépl. (€)</th><th>BSI − Déplac (€)</th><th>5%</th>
      </tr></thead>
      <tbody>${rowsHTML}</tbody>
      <tfoot>
        <tr class="t1">
          <td><strong>TOTAL</strong></td>
          <td>${tBSI}</td><td></td>
          <td>${tDeplac}</td><td>${tNet}</td><td>${tPct}</td>
        </tr>
        <tr class="t2">
          <td colspan="4"></td>
          <td class="final-lbl">À PAYER</td>
          <td class="final-amt">${tFinal}</td>
        </tr>
      </tfoot>
    </table>
    <p class="note">Montants tronqués au centime, non arrondis · BSI+IFI − 5% + Déplacements</p>
    </body></html>`;

    const blob = new Blob([html], { type: 'text/html;charset=utf-8;' });
    const url  = URL.createObjectURL(blob);
    const win  = window.open(url, '_blank');
    win.onload = () => { win.focus(); win.print(); };
  }

  // Convert dd/mm/yyyy → yyyy-mm-dd
  function isoDate(fr) {
    if (!fr) return '';
    const parts = fr.split('/');
    if (parts.length !== 3) return '';
    return `${parts[2]}-${parts[1].padStart(2,'0')}-${parts[0].padStart(2,'0')}`;
  }

  addRow(); addRow(); addRow();
</script>
</body>
</html>
